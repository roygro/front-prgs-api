<div *ngIf="fullScreen" class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-white bg-opacity-75" style="z-index: 9999;">
  <div class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">{{ message }}</span>
    </div>
    <p class="mt-2">{{ message }}</p>
  </div>
</div>

<div *ngIf="!fullScreen" class="text-center p-4">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">{{ message }}</span>
  </div>
  <p class="mt-2">{{ message }}</p>
</div>
