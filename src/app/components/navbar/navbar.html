<nav class="bg-black border-b border-gray-800 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      
      <!-- Logo -->
      <a routerLink="/" class="text-white font-bold text-xl no-underline">
        TaskManager
      </a>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center gap-4">
        <ng-container *ngIf="user">
          <a routerLink="/dashboard" 
             class="text-gray-300 hover:text-green-500 px-3 py-2 rounded-lg transition duration-200 no-underline">
            Dashboard
          </a>
          <a routerLink="/tasks" 
             class="text-gray-300 hover:text-green-500 px-3 py-2 rounded-lg transition duration-200 no-underline">
            Tareas
          </a>
          <a routerLink="/users" 
             class="text-gray-300 hover:text-green-500 px-3 py-2 rounded-lg transition duration-200 no-underline">
            Usuarios
          </a>
          <a routerLink="/profile" 
             class="text-gray-300 hover:text-green-500 px-3 py-2 rounded-lg transition duration-200 no-underline">
            Mi Perfil
          </a>
          <span class="text-green-500 px-3 py-2">Hola, {{ user.name }}</span>
          <button (click)="logout()" 
                  class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition duration-200">
            Cerrar Sesión
          </button>
        </ng-container>
        <ng-container *ngIf="!user">
          <a routerLink="/login" 
             class="text-gray-300 hover:text-green-500 px-3 py-2 rounded-lg transition duration-200 no-underline">
            Login
          </a>
          <a routerLink="/register" 
             class="text-gray-300 hover:text-green-500 px-3 py-2 rounded-lg transition duration-200 no-underline">
            Registrar
          </a>
        </ng-container>
      </div>

      <!-- Mobile menu button -->
      <button (click)="toggleMenu()" class="md:hidden text-white focus:outline-none hover:bg-gray-800 p-2 rounded-lg transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="mobileMenuOpen" class="md:hidden py-4 border-t border-gray-800">
      <div class="flex flex-col gap-2">
        <ng-container *ngIf="user">
          <a routerLink="/dashboard" 
             class="text-gray-300 hover:text-green-500 hover:bg-gray-800 px-3 py-2 rounded-lg transition no-underline"
             (click)="toggleMenu()">
            Dashboard
          </a>
          <a routerLink="/tasks" 
             class="text-gray-300 hover:text-green-500 hover:bg-gray-800 px-3 py-2 rounded-lg transition no-underline"
             (click)="toggleMenu()">
            Tareas
          </a>
          <a routerLink="/users" 
             class="text-gray-300 hover:text-green-500 hover:bg-gray-800 px-3 py-2 rounded-lg transition no-underline"
             (click)="toggleMenu()">
            Usuarios
          </a>
          <a routerLink="/profile" 
             class="text-gray-300 hover:text-green-500 hover:bg-gray-800 px-3 py-2 rounded-lg transition no-underline"
             (click)="toggleMenu()">
            Mi Perfil
          </a>
          <span class="text-green-500 px-3 py-2">Hola, {{ user.name }}</span>
          <button (click)="logout(); toggleMenu()" 
                  class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition text-left">
            Cerrar Sesión
          </button>
        </ng-container>
        <ng-container *ngIf="!user">
          <a routerLink="/login" 
             class="text-gray-300 hover:text-green-500 hover:bg-gray-800 px-3 py-2 rounded-lg transition no-underline"
             (click)="toggleMenu()">
            Login
          </a>
          <a routerLink="/register" 
             class="text-gray-300 hover:text-green-500 hover:bg-gray-800 px-3 py-2 rounded-lg transition no-underline"
             (click)="toggleMenu()">
            Registrar
          </a>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
