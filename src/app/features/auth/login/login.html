<div class="min-h-screen bg-gradient-to-br from-green-950 to-emerald-800 flex items-center justify-center py-10">
  <div class="max-w-md w-full mx-4">
    
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center text-3xl backdrop-blur mx-auto mb-4 border border-white/20">
        📋
      </div>
      <h1 class="text-3xl font-bold text-white">TaskManager</h1>
      <p class="text-white/60 mt-1">Inicia sesión para continuar</p>
    </div>

    <!-- Login Card -->
    <div class="backdrop-blur-md bg-white/10 rounded-2xl p-6 md:p-8 border border-white/20 shadow-xl">
      <h2 class="text-xl font-semibold text-white mb-6 text-center">Iniciar Sesión</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Usuario -->
        <div class="mb-4">
          <label class="block text-white/80 text-sm mb-1">Usuario</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="text-white/50">👤</span>
            </div>
            <input type="text" 
                   formControlName="username"
                   class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/30 focus:border-transparent transition"
                   placeholder="Ingresa tu usuario">
          </div>
          <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" 
               class="text-red-300 text-xs mt-1">
            Usuario requerido (mínimo 3 caracteres)
          </div>
        </div>
        
        <!-- Contraseña -->
        <div class="mb-4">
          <label class="block text-white/80 text-sm mb-1">Contraseña</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="text-white/50">🔒</span>
            </div>
            <input type="password" 
                   formControlName="password"
                   class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/30 focus:border-transparent transition"
                   placeholder="Ingresa tu contraseña">
          </div>
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" 
               class="text-red-300 text-xs mt-1">
            Contraseña requerida (mínimo 6 caracteres)
          </div>
        </div>
        
        <!-- Error -->
        <div *ngIf="error" class="mb-4 p-3 rounded-xl bg-red-500/20 border border-red-500/30 text-red-200 text-sm text-center">
          {{ error }}
        </div>
        
        <!-- Botón -->
        <button type="submit" 
                [disabled]="loginForm.invalid || loading"
                class="w-full py-3 rounded-xl text-white font-medium transition-all duration-200 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
                style="background: linear-gradient(135deg, #15803d, #166534);">
          {{ loading ? 'Cargando...' : 'Iniciar Sesión' }}
        </button>
        
        <!-- Link a registro -->
        <div class="text-center mt-4">
          <a routerLink="/register" class="text-white/70 hover:text-white text-sm transition">
            ¿No tienes cuenta? Regístrate
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
